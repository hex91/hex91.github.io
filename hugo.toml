baseURL = 'https://hex91.github.io/'
title = '星星躲在乌云中'
languageCode = 'zh-cn'
defaultContentLanguage = 'zh-cn'
theme = 'PaperMod'

# 搜索引擎索引（PaperMod 搜索依赖根目录 index.json）
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 构建配置
pygmentsCodefences = true
hasCJKLanguage = true

[params]
  # 站点信息
  mainSections = ['posts']  # 首页文章列表来源（必须设置，否则首页不显示文章）
  title = '星星躲在乌云中'
  titleSeparator = ' | '
  description = '移动安全研究与逆向分析技术博客'
  author = '星星躲在乌云中'
  github = 'https://github.com/hex91'

  # 主题切换
  defaultTheme = 'auto'  # auto / light / dark

  # 搜索
  enableSearch = true

  # 阅读时间
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCounts = true

[params.homeInfoParams]
  Title = '星星躲在乌云中'
  Subtitle = '移动安全研究与逆向分析'
  Content = '专注 Android/iOS 逆向、Frida/Xposed 实战、移动安全研究。偶尔写点读书笔记。'

[params.search]
  minWordLength = 1  # 支持中文单字搜索

# 菜单
[[menu.main]]
  name = '首页'
  url = '/'
  weight = 10

[[menu.main]]
  name = '归档'
  url = '/archives/'
  weight = 20

[[menu.main]]
  name = '标签'
  url = '/tags/'
  weight = 30

[[menu.main]]
  name = '搜索'
  url = '/search/'
  weight = 40

[[menu.main]]
  name = '关于'
  url = '/about'
  weight = 50

# Giscus 评论
[params.comments]
  enable = true
  giscus = true

[params.giscus]
  repo = 'hex91/hex91.github.io'
  repoId = 'R_kgDOTLn_FA'
  category = 'Announcements'
  categoryId = 'DIC_kwDOTLn_FM4DAXDg'
  mapping = 'pathname'
  strict = '0'
  reactionsEnabled = '1'
  emitMetadata = '0'
  inputPosition = 'bottom'
  theme = 'preferred_color_scheme'
  lang = 'zh-CN'
  crossorigin = 'anonymous'

# GoatCounter 访问统计
[params.analytics]
  goatcounter = 'hanxingxing'  # 已注册：hanxingxing.goatcounter.com
