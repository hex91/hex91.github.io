baseURL = 'https://atworkhi.github.io/'
title = '星星躲在乌云中'
languageCode = 'zh-cn'
defaultContentLanguage = 'zh-cn'
theme = 'PaperMod'

# 构建配置
pygmentsCodefences = true
hasCJKLanguage = true

[params]
  # 站点信息
  title = '星星躲在乌云中'
  titleSeparator = ' | '
  description = '移动安全研究与逆向分析技术博客'
  author = '星星躲在乌云中'
  github = 'https://github.com/atworkhi'

  # 主题切换
  defaultTheme = 'auto'  # auto / light / dark

  # 搜索
  enableSearch = true

  # 阅读时间
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCounts = true

  # 自定义样式
  customCSS = ['/css/custom.css']

[params.homeInfoParams]
  Title = '星星躲在乌云中'
  Subtitle = '移动安全研究与逆向分析'
  Content = '专注 Android/iOS 逆向、Frida/Xposed 实战、移动安全研究。偶尔写点读书笔记。'

[params.search]
  minWordLength = 1  # 支持中文单字搜索

# 菜单
[[menu.main]]
  name = '首页'
  url = '/'
  weight = 10

[[menu.main]]
  name = '归档'
  url = '/archives'
  weight = 20

[[menu.main]]
  name = '标签'
  url = '/tags'
  weight = 30

[[menu.main]]
  name = '搜索'
  url = '/search'
  weight = 40

[[menu.main]]
  name = '关于'
  url = '/about'
  weight = 50

# Giscus 评论
[params.comments]
  enable = true
  giscus = true

[params.giscus]
  repo = 'atworkhi/atworkhi.github.io'
  repoId = 'R_kgDOTLn_FA'
  category = 'Announcements'
  categoryId = 'DIC_kwDOTLn_FM4DAXDg'
  mapping = 'pathname'
  strict = '0'
  reactionsEnabled = '1'
  emitMetadata = '0'
  inputPosition = 'bottom'
  theme = 'preferred_color_scheme'
  lang = 'zh-CN'
  crossorigin = 'anonymous'

# GoatCounter 访问统计
[params.analytics]
  goatcounter = 'hanxingxing'  # 已注册：hanxingxing.goatcounter.com
