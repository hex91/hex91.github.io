{{- /* 文章目录滚动高亮 (scrollspy)：滚动到哪一节，右侧目录对应项高亮 */ -}}
<script>
(function () {
  var toc = document.getElementById('toc-sidebar');
  if (!toc) return;
  var links = Array.prototype.slice.call(toc.querySelectorAll('a[href^="#"]'));
  var items = [];
  links.forEach(function (a) {
    var id = decodeURIComponent(a.getAttribute('href').slice(1));
    var el = document.getElementById(id);
    if (el) items.push({ el: el, link: a });
  });
  if (!items.length) return;

  var current = null;
  function update() {
    var pos = window.scrollY + 100;
    var active = null;
    for (var i = 0; i < items.length; i++) {
      if (items[i].el.getBoundingClientRect().top + window.scrollY <= pos) {
        active = items[i];
      } else {
        break;
      }
    }
    if (!active) active = items[0];
    if (active.link !== current) {
      if (current) current.classList.remove('active');
      active.link.classList.add('active');
      current = active.link;
    }
  }

  var ticking = false;
  function onScroll() {
    if (!ticking) {
      window.requestAnimationFrame(function () { update(); ticking = false; });
      ticking = true;
    }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll);
  update();
})();
</script>
